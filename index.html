<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Yes or No App</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body class="screen screen--idle">
    <main class="app-card" aria-live="polite">
      <p class="eyebrow">Quick Choice</p>
      <h1 id="title">Choose Yes or No</h1>
      <p id="message">Tap a button to change the whole screen.</p>

      <div class="button-row">
        <button id="yesButton" class="choice-button choice-button--yes" type="button">
          Yes
        </button>
        <button id="noButton" class="choice-button choice-button--no" type="button">
          No
        </button>
      </div>

      <button id="resetButton" class="reset-button" type="button" hidden>
        Reset
      </button>
    </main>

    <script src="script.js"></script>
  </body>
</html>
